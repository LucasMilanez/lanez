app = "lanez"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  BRIEFING_HISTORY_WINDOW_DAYS = "90"
  AUDIT_HISTORY_WINDOW_DAYS = "30"
  GROQ_WHISPER_MODEL = "whisper-large-v3-turbo"
  VOICE_MAX_AUDIO_BYTES = "5242880"
  VOICE_MAX_DURATION_SECONDS = "30"
  CORS_ORIGINS = "https://lanez.vercel.app"
  MICROSOFT_REDIRECT_URI = "https://lanez.fly.dev/auth/callback"
  WEBHOOK_NOTIFICATION_URL = "https://lanez.fly.dev/webhooks/graph"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
