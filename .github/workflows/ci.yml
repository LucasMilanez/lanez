name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lanez
          POSTGRES_PASSWORD: lanez
          POSTGRES_DB: lanez_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lanez"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://lanez:lanez@localhost:5432/lanez_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-only
      MICROSOFT_CLIENT_ID: test-client-id
      MICROSOFT_CLIENT_SECRET: test-client-secret
      MICROSOFT_REDIRECT_URI: http://localhost:8000/auth/callback
      WEBHOOK_CLIENT_STATE: test-webhook-state
      ANTHROPIC_API_KEY: test-key-not-used
      GROQ_API_KEY: test-key-not-used

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
