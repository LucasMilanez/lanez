name: Feature request
description: Propose a new feature or non-trivial improvement.
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve? Who benefits?
      placeholder: e.g. As a Lanez user, I can't filter briefings by attendee.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the shape of the solution. API/UI sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you evaluate?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, discussions, or prior art.
